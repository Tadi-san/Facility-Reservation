spring:
  datasource:
    url: jdbc:h2:mem:eagle;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
eagle:
  jwt-secret: test-secret-should-be-at-least-thirty-two-characters
  data-encryption-key: test-encryption-key-32-characters-long
  rate-limit:
    enabled: false
